services:
  app:
    image: time4action/t4a-partner-portal-api
    pull_policy: always
    container_name: t4a-partner-portal-api
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - /data/stack/apps/time-4-action/export/api/data/.env
    volumes:
      - /data/stack/apps/time-4-action/export/api/data:/data      


